<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Cost Calculator</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #1e3c72; margin-bottom: 5px; }
        .user-details {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            color: #555;
            border-left: 5px solid #1e3c72;
        }
        .user-details span { color: #d35400; font-weight: bold; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #1e3c72;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        button:hover { background: #2a5298; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h2>Ticket Calculator</h2>
        <div class="user-details">
            Name: <span>k.nikhitha</span><br>
            Roll No: <span>24071A06G8</span>
        </div>
        
        <form action="calculate" method="POST">
            <div class="form-group">
                <label for="tickets">Number of Tickets:</label>
                <input type="number" id="tickets" name="tickets" placeholder="Enter quantity" required min="1">
            </div>
            <div class="form-group">
                <label for="price">Price per Ticket (₹):</label>
                <input type="number" id="price" name="price" value="200" readonly>
            </div>
            <button type="submit">Calculate Total</button>
        </form>
    </div>
</body>
</html>
